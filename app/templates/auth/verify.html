<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Verify Email</h4>
                    </div>
                    <div class="card-body">
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                {% for msg in messages %}
                                    <div class="alert alert-info">{{ msg }}</div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <p class="text-center">
                            OTP sent to: <strong>{{ email }}</strong>
                        </p>
                        
                        <form method="POST">
                            <div class="mb-3">
                                <label>Enter 6-digit OTP</label>
                                <input type="text" name="otp" class="form-control text-center" 
                                       maxlength="6" pattern="[0-9]{6}" 
                                       style="font-size: 24px; letter-spacing: 5px;" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                Verify
                            </button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <button onclick="resendOTP()" class="btn btn-link">
                                Resend OTP
                            </button>
                        </div>
                        
                        <div class="text-center mt-3">
                            <a href="{{ url_for('auth.signup') }}">Back to Signup</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
    function resendOTP() {
        fetch('/auth/resend-otp', {method: 'POST'})
        .then(r => r.json())
        .then(d => {
            alert(d.message);
        });
    }
    </script>
</body>
</html>
