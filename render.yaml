services:
  - type: web
    name: vast-scanner
    env: python
    plan: free  # ⚠️ ADD THIS - Forces free tier
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vast_db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: vast_db
    plan: free  # ⚠️ ADD THIS - Forces free database
    databaseName: vast_scanner
    user: vast_user
